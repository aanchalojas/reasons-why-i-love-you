<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100 Reasons I Love You 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blush:    #f7c5c5;
      --rose:     #e8607a;
      --deep:     #c0334f;
      --petal:    #fff0f3;
      --cream:    #fffaf9;
      --text:     #3a1a22;
      --soft:     #9b4460;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── floating petals ── */
    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal {
      position: absolute;
      top: -40px;
      font-size: 1.2rem;
      opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateX(0) rotate(0deg);   opacity: 0.7; }
      100% { transform: translateX(60px) rotate(360deg); opacity: 0; top: 110vh; }
    }

    /* ── hero ── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 72px 24px 52px;
      background: linear-gradient(160deg, #ffe0e8 0%, #fff0f3 60%, var(--cream) 100%);
    }
    .hero-eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 14px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 18px;
    }
    .hero h1 em { color: var(--rose); font-style: italic; }
    .hero-sub {
      font-size: 1rem;
      color: var(--soft);
      font-weight: 300;
      max-width: 460px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }
    .counter-bar {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      background: white;
      border: 1.5px solid var(--blush);
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 0.85rem;
      color: var(--soft);
    }
    .counter-bar strong { color: var(--rose); font-size: 1rem; }

    /* ── grid ── */
    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 18px;
      padding: 40px 28px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── card ── */
    .card-wrap {
      perspective: 900px;
      height: 190px;
      opacity: 0;
      transform: scale(0.88) translateY(14px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .card-wrap.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
      border-radius: 18px;
    }
    .card-wrap:hover .card-inner:not(.flipped) {
      transform: rotateY(8deg) scale(1.03);
      box-shadow: -6px 14px 32px rgba(200,50,80,0.18);
    }
    .card-inner.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute; inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      padding: 16px;
      text-align: center;
    }

    /* front */
    .face-front {
      background: linear-gradient(135deg, var(--rose) 0%, var(--deep) 100%);
      box-shadow: 0 6px 22px rgba(200,50,80,0.3);
    }
    .num-badge {
      position: absolute;
      top: 12px; left: 14px;
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.08em;
    }
    .big-heart {
      font-size: 3rem;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
      transition: transform 0.3s;
    }
    .card-wrap:hover .big-heart { transform: scale(1.15) rotate(-6deg); }
    .tap-hint {
      margin-top: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    /* back */
    .face-back {
      background: var(--petal);
      transform: rotateY(180deg);
      box-shadow: 0 6px 22px rgba(200,50,80,0.15);
      border: 1.5px solid var(--blush);
    }
    .back-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--rose);
      line-height: 1;
      margin-bottom: 8px;
    }
    .back-text {
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.55;
      font-weight: 400;
    }

    /* ── milestone stripe ── */
    .milestone {
      grid-column: 1 / -1;
      text-align: center;
      padding: 6px 0 2px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--soft);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .milestone::before, .milestone::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--blush), transparent);
    }

    /* ── footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 20px 60px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--soft);
    }
    footer span { color: var(--rose); font-size: 1.4rem; }

    @media (max-width: 480px) {
      .grid { gap: 12px; padding: 24px 14px 40px; }
      .card-wrap { height: 160px; }
    }
  </style>
</head>
<body>

<!-- floating petals -->
<div class="petals" id="petals"></div>

<!-- hero -->
<header class="hero">
  <p class="hero-eyebrow">for my sweet little boy</p>
  <h1>Reasons Why I Love<br/><em>You</em></h1>
  <p class="hero-sub">Flip each card to discover why you're the most wonderful person in my world.</p>
  <div class="counter-bar">
    <strong id="opened">0</strong>&nbsp;/ 100 revealed &nbsp;💕
  </div>
</header>

<!-- grid -->
<main class="grid" id="grid">
</main>

<footer>
  Made with every piece of my heart &nbsp;<span>♥</span>
</footer>

<script>
const reasons = [
  "You always make me smile, no matter what",
  "You believe in me, even when I don't.",
  "You listen — truly listen.",
  "You support my dreams wholeheartedly.",
  "You're effortlessly handsome.",
  "You challenge me to grow.",
  "You make even the boring things fun.",
  "You make me feel safe.",
  "You always know how to cheer me up.",
  "You're my biggest cheerleader after your sasur.",
  "You laugh at my lame jokes.",
  "You take care of me in small, beautiful ways.",
  "You never give up — on life, on us. (Breakup krle exceptional.)",
  "You're hardworking and ambitious.",
  "Your smile is contagious!",
  "You're stronger than you think!",
  "You're incredibly intelligent.",
  "You remember the little things.",
  "You're capable of amazing things!",
  "You give the best advice.",
  "You see the best in me.",
  "You make me feel beautiful inside and out.",
  "You respect me and my opinions.",
  "You let me be my weird self.",
  "You're patient, even when I'm not.",
  "You're very very romantic.",
  "You love my quirks.",
  "You make my life brighter.",
  "You're a gentleman in every sense.",
  "You're honest and loyal. Honest se yaad aaya papa ki dukaan kaisi h",
  "You care about people genuinely.",
  "You have the warmest smile.",
  "You're my calm in the chaos.",
  "You inspire me to be better.",
  "You're always up for adventure!",
  "You say \"I love you\" and mean it. I mean you obviously have to.",
  "You make time for us.",
  "You understand me without words.",
  "You never judge me.",
  "You stand by me in every storm. You have to.",
  "You're creative and unique.",
  "You share your thoughts and dreams with me.",
  "You respect boundaries.",
  "You trust me completely.",
  "You forgive me when I mess up.",
  "You share your food (even when you don't want to).",
  "You laugh like no one's watching.",
  "You're a great listener.",
  "You always have something nice to say.",
  "You're silly in the best way.",
  "You talk to me about everything.",
  "You never let me feel alone.",
  "You hold my hand at the right times.",
  "You show love in actions, not just words.",
  "You're humble about your achievements.",
  "You dream big.",
  "You value honesty.",
  "You're emotionally strong.",
  "You love animals.",
  "You believe in true love.",
  "You remember our special dates.",
  "You're passionate about what you love.",
  "You're proud of me.",
  "You make me feel lucky every day.",
  "You protect me without being possessive.",
  "You push me toward my goals.",
  "You're open-minded and thoughtful.",
  "You light up my world.",
  "You're goofy and cute.",
  "You appreciate the little moments.",
  "You give me space when I need it.",
  "You always try to make things right.",
  "You love me unconditionally.",
  "You bring peace to my overthinking mind.",
  "You say my name like it's your favorite word.",
  "You respect women and treat everyone with kindness.",
  "You bring balance to my life.",
  "You never make me feel \"less than.\"",
  "You see beauty in everyday things.",
  "You trust me with your heart.",
  "You give me butterflies every single time.",
  "You care about my happiness more than your ego.",
  "You help me through my fears.",
  "You make \"forever\" feel real.",
  "You're the best cuddle partner.",
  "You're adventurous and spontaneous.",
  "You never stop trying.",
  "You make me feel like I matter.",
  "You love with your whole heart.",
  "You're my partner and my best friend.",
  "You bring out the best in me.",
  "You've become my favorite habit.",
  "You complete the love stories I imagined.",
  "You're gentle, even in tough times.",
  "You accept my past and believe in our future.",
  "You're everything I ever wanted.",
  "You're my safe place.",
  "You are you — and I love every bit of it.",
  "In a world full of noise, your love is my favorite melody.",
  "You didn't just walk into my life — you became my favorite part of it."
];

const milestones = { 25: "Still going strong…", 50: "Halfway there, and it keeps getting better 💕", 75: "75 reasons and counting…", 100: "And a hundred more I'll never stop finding." };

const hearts = ["❤️","🌸","💖","🌹","💗","✨","💝","🌷"];
const grid = document.getElementById('grid');
let opened = 0;

reasons.forEach((text, i) => {
  const n = i + 1;

  // milestone divider
  if (milestones[n]) {
    const div = document.createElement('div');
    div.className = 'milestone';
    div.textContent = milestones[n];
    grid.appendChild(div);
  }

  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.innerHTML = `
    <div class="card-inner" data-index="${i}">
      <div class="face face-front">
        <span class="num-badge">${n}</span>
        <div class="big-heart">${hearts[i % hearts.length]}</div>
        <div class="tap-hint">tap to reveal</div>
      </div>
      <div class="face face-back">
        <div class="back-num">${n}.</div>
        <div class="back-text">${text}</div>
      </div>
    </div>`;
  grid.appendChild(wrap);

  wrap.addEventListener('click', () => {
    const inner = wrap.querySelector('.card-inner');
    const wasFlipped = inner.classList.contains('flipped');
    inner.classList.toggle('flipped');
    if (!wasFlipped) {
      opened++;
    } else {
      opened--;
    }
    document.getElementById('opened').textContent = opened;
  });
});

// intersection observer stagger
const obs = new IntersectionObserver((entries) => {
  entries.forEach((e, idx) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('visible'), idx * 40);
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.card-wrap').forEach(c => obs.observe(c));

// falling petals
const petalEl = document.getElementById('petals');
const petalChars = ['🌸','🌺','🌷','💮','✿','❀'];
for (let i = 0; i < 22; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalChars[i % petalChars.length];
  p.style.left = Math.random() * 100 + 'vw';
  p.style.fontSize = (0.8 + Math.random() * 0.9) + 'rem';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = (Math.random() * 15) + 's';
  petalEl.appendChild(p);
}
</script>
</body>
</html>
